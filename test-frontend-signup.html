<!DOCTYPE html>
<html>
<head>
    <title>Test Signup</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .form-group { margin: 10px 0; }
        label { display: inline-block; width: 150px; }
        input, select { padding: 5px; width: 300px; }
        button { padding: 10px 20px; margin-top: 10px; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Test Signup Form</h1>
    
    <form id="signupForm">
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name" value="Test User" required>
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" value="testuser@example.com" required>
        </div>
        
        <div class="form-group">
            <label>Phone:</label>
            <input type="tel" id="phone" value="9999999999">
        </div>
        
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" value="test123" required>
        </div>
        
        <div class="form-group">
            <label>Role:</label>
            <select id="role">
                <option value="Student">Student</option>
                <option value="Teacher">Teacher</option>
                <option value="Parent">Parent</option>
                <option value="Admin">Admin</option>
            </select>
        </div>
        
        <button type="submit">Sign Up</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Loading...';
            resultDiv.className = 'result';
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                collegeId: '2aad2902-caee-4a50-bcb9-0b75e0c75262'
            };
            
            try {
                const response = await fetch('http://localhost:5001/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = '<strong>Success!</strong><br>' + 
                        'User created: ' + result.data.user.name + '<br>' +
                        'Email: ' + result.data.user.email + '<br>' +
                        'Role: ' + result.data.user.role + '<br>' +
                        'Student ID: ' + (result.data.roleProfile?.studentId || 'N/A');
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = '<strong>Error!</strong><br>' + 
                        (result.message || 'Unknown error') + '<br>' +
                        (result.error || '');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '<strong>Network Error!</strong><br>' + error.message;
            }
        });
    </script>
</body>
</html>
