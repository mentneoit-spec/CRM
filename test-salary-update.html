<!DOCTYPE html>
<html>
<head>
    <title>Test Salary Update API</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .box { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 4px; }
        button { padding: 8px 15px; margin: 5px; cursor: pointer; }
        input { padding: 8px; margin: 5px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 Test Salary Update API</h1>
    
    <div class="box">
        <h2>Step 1: Login to get token</h2>
        <button onclick="loginAsHRManager()">🔐 Login as HR Manager</button>
        <p id="loginStatus"></p>
    </div>

    <div class="box">
        <h2>Step 2: Fetch Teachers</h2>
        <button onclick="fetchTeachers()">📊 Fetch Teachers</button>
        <p id="fetchStatus"></p>
        <pre id="teachersOutput"></pre>
    </div>

    <div class="box">
        <h2>Step 3: Update Salary</h2>
        <label>Teacher ID: <input type="text" id="teacherId" placeholder="e.g., 1" value="1" /></label><br>
        <label>New Salary: <input type="number" id="newSalary" placeholder="e.g., 50000" value="50000" /></label><br>
        <button onclick="updateSalary()">💾 Update Salary</button>
        <p id="updateStatus"></p>
        <pre id="updateOutput"></pre>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let collegeId = localStorage.getItem('collegeId');
        let teachers = [];

        async function loginAsHRManager() {
            try {
                document.getElementById('loginStatus').innerHTML = '⏳ Logging in...';
                
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'hrmanager@college.com',
                        password: 'HRManager123'
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    token = result.token;
                    collegeId = result.collegeId;
                    localStorage.setItem('token', token);
                    localStorage.setItem('collegeId', collegeId);
                    document.getElementById('loginStatus').innerHTML = `<span class="success">✅ Login successful! Token: ${token.substring(0, 20)}...</span>`;
                } else {
                    document.getElementById('loginStatus').innerHTML = `<span class="error">❌ Login failed: ${response.status}</span>`;
                }
            } catch (error) {
                document.getElementById('loginStatus').innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        async function fetchTeachers() {
            try {
                document.getElementById('fetchStatus').innerHTML = '⏳ Fetching teachers...';
                
                if (!token) {
                    document.getElementById('fetchStatus').innerHTML = '<span class="error">❌ Please login first</span>';
                    return;
                }

                const response = await fetch('http://localhost:5000/api/hr/teachers', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    teachers = result.data || [];
                    document.getElementById('fetchStatus').innerHTML = `<span class="success">✅ Fetched ${teachers.length} teachers</span>`;
                    document.getElementById('teachersOutput').textContent = JSON.stringify(result, null, 2);
                    
                    // Auto-fill first teacher ID
                    if (teachers.length > 0) {
                        document.getElementById('teacherId').value = teachers[0].id;
                    }
                } else {
                    const errorText = await response.text();
                    document.getElementById('fetchStatus').innerHTML = `<span class="error">❌ Error: ${response.status} - ${errorText}</span>`;
                }
            } catch (error) {
                document.getElementById('fetchStatus').innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        async function updateSalary() {
            try {
                document.getElementById('updateStatus').innerHTML = '⏳ Updating salary...';
                
                if (!token) {
                    document.getElementById('updateStatus').innerHTML = '<span class="error">❌ Please login first</span>';
                    return;
                }

                const teacherId = document.getElementById('teacherId').value;
                const newSalary = parseFloat(document.getElementById('newSalary').value);

                if (!teacherId || !newSalary) {
                    document.getElementById('updateStatus').innerHTML = '<span class="error">❌ Please enter teacher ID and salary</span>';
                    return;
                }

                const url = `http://localhost:5000/api/hr/teachers/${teacherId}/salary`;
                console.log('📍 Calling:', url);

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ salary: newSalary })
                });

                console.log('📡 Response Status:', response.status);

                if (response.ok) {
                    const result = await response.json();
                    document.getElementById('updateStatus').innerHTML = `<span class="success">✅ Salary updated! New salary: ₹${result.data.salary}</span>`;
                    document.getElementById('updateOutput').textContent = JSON.stringify(result, null, 2);
                } else {
                    const errorText = await response.text();
                    document.getElementById('updateStatus').innerHTML = `<span class="error">❌ Error: ${response.status} - ${errorText}</span>`;
                    document.getElementById('updateOutput').textContent = errorText;
                }
            } catch (error) {
                document.getElementById('updateStatus').innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        // Auto-login if this is a fresh page load
        window.addEventListener('load', () => {
            if (localStorage.getItem('token')) {
                document.getElementById('loginStatus').innerHTML = `<span class="success">✅ Using existing token from localStorage</span>`;
            }
        });
    </script>
</body>
</html>
