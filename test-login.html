<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .form-group { margin: 10px 0; }
        label { display: inline-block; width: 150px; }
        input { padding: 5px; width: 300px; }
        button { padding: 10px 20px; margin-top: 10px; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Test Login Form</h1>
    
    <form id="loginForm">
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" value="teststudent@example.com" required>
        </div>
        
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" value="test123" required>
        </div>
        
        <button type="submit">Login</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Loading...';
            resultDiv.className = 'result';
            
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                collegeId: '2aad2902-caee-4a50-bcb9-0b75e0c75262'
            };
            
            try {
                const response = await fetch('http://localhost:5001/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = '<strong>Login Success!</strong><br>' + 
                        'Name: ' + result.data.user.name + '<br>' +
                        'Email: ' + result.data.user.email + '<br>' +
                        'Role: ' + result.data.user.role + '<br>' +
                        'Token: ' + result.data.token.substring(0, 50) + '...';
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = '<strong>Login Failed!</strong><br>' + 
                        (result.message || 'Unknown error');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '<strong>Network Error!</strong><br>' + error.message;
            }
        });
    </script>
</body>
</html>
