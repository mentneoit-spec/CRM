<!DOCTYPE html>
<html>
<head>
    <title>Test Complete Login Flow</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #e8f5e9; border-color: #4caf50; }
        .error { background: #ffebee; border-color: #f44336; }
        .info { background: #e3f2fd; border-color: #2196f3; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        input { padding: 8px; margin: 5px; width: 300px; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 Complete Login Flow Test</h1>
    
    <div class="section info">
        <h3>Step 1: Signup</h3>
        <input type="text" id="signupName" placeholder="Name" value="Test User Flow">
        <input type="email" id="signupEmail" placeholder="Email" value="testflow@example.com">
        <input type="password" id="signupPassword" placeholder="Password" value="test123">
        <button onclick="testSignup()">Test Signup</button>
        <div id="signupResult"></div>
    </div>
    
    <div class="section info">
        <h3>Step 2: Login</h3>
        <input type="email" id="loginEmail" placeholder="Email" value="testflow@example.com">
        <input type="password" id="loginPassword" placeholder="Password" value="test123">
        <button onclick="testLogin()">Test Login</button>
        <div id="loginResult"></div>
    </div>
    
    <div class="section info">
        <h3>Step 3: Access Dashboard</h3>
        <button onclick="testDashboard()">Test Dashboard Access</button>
        <div id="dashboardResult"></div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5001/api';
        const COLLEGE_ID = '2aad2902-caee-4a50-bcb9-0b75e0c75262';
        let authToken = null;
        
        async function testSignup() {
            const resultDiv = document.getElementById('signupResult');
            resultDiv.innerHTML = '<p>⏳ Testing signup...</p>';
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('signupName').value,
                        email: document.getElementById('signupEmail').value,
                        password: document.getElementById('signupPassword').value,
                        role: 'Student',
                        collegeId: COLLEGE_ID
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.className = 'section success';
                    resultDiv.innerHTML = `
                        <h4>✅ Signup Successful!</h4>
                        <p><strong>User ID:</strong> ${data.data.user.id}</p>
                        <p><strong>Role:</strong> ${data.data.user.role}</p>
                        <p><strong>Student ID:</strong> ${data.data.roleProfile?.studentId || 'N/A'}</p>
                        <p><strong>Token:</strong> ${data.data.token.substring(0, 30)}...</p>
                        <p>✅ User created in User table</p>
                        <p>✅ Student record created in Student table</p>
                    `;
                    authToken = data.data.token;
                } else {
                    resultDiv.className = 'section error';
                    resultDiv.innerHTML = `<h4>❌ Signup Failed</h4><p>${data.message}</p>`;
                }
            } catch (error) {
                resultDiv.className = 'section error';
                resultDiv.innerHTML = `<h4>❌ Error</h4><p>${error.message}</p>`;
            }
        }
        
        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '<p>⏳ Testing login...</p>';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value,
                        collegeId: COLLEGE_ID
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.data.token;
                    localStorage.setItem('token', authToken);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    resultDiv.className = 'section success';
                    resultDiv.innerHTML = `
                        <h4>✅ Login Successful!</h4>
                        <p><strong>Name:</strong> ${data.data.user.name}</p>
                        <p><strong>Email:</strong> ${data.data.user.email}</p>
                        <p><strong>Role:</strong> ${data.data.user.role}</p>
                        <p><strong>Token:</strong> ${authToken.substring(0, 30)}...</p>
                        <p>✅ Token stored in localStorage</p>
                        <p>✅ User data stored in localStorage</p>
                        <p><strong>Dashboard URL:</strong> /student/dashboard</p>
                    `;
                } else {
                    resultDiv.className = 'section error';
                    resultDiv.innerHTML = `<h4>❌ Login Failed</h4><p>${data.message}</p>`;
                }
            } catch (error) {
                resultDiv.className = 'section error';
                resultDiv.innerHTML = `<h4>❌ Error</h4><p>${error.message}</p>`;
            }
        }
        
        async function testDashboard() {
            const resultDiv = document.getElementById('dashboardResult');
            
            if (!authToken) {
                authToken = localStorage.getItem('token');
            }
            
            if (!authToken) {
                resultDiv.className = 'section error';
                resultDiv.innerHTML = '<h4>❌ No Token</h4><p>Please login first</p>';
                return;
            }
            
            resultDiv.innerHTML = '<p>⏳ Testing dashboard access...</p>';
            
            try {
                // Test if we can access a protected endpoint
                const response = await fetch(`${API_URL}/student/profile`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success || response.status === 200) {
                    resultDiv.className = 'section success';
                    resultDiv.innerHTML = `
                        <h4>✅ Dashboard Access Working!</h4>
                        <p>✅ Token is valid</p>
                        <p>✅ Can access protected routes</p>
                        <p><strong>Frontend Dashboard:</strong> <a href="http://localhost:3000/student/dashboard" target="_blank">Open Dashboard</a></p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'section error';
                    resultDiv.innerHTML = `<h4>⚠️ Dashboard Access Issue</h4><p>${data.message || 'Unknown error'}</p>`;
                }
            } catch (error) {
                resultDiv.className = 'section error';
                resultDiv.innerHTML = `<h4>❌ Error</h4><p>${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
